# LOCAL only — Postgres for developer machines.
# DEV/PRODUCTION use native Postgres; do not run this compose on those hosts.
#
# Usage (from backend/):
#   docker-compose up -d
#   docker-compose down
#   docker-compose logs -f postgres
#   # or: docker compose … if the Compose V2 plugin is installed
#
# Credentials come from backend/.env (same vars as DEV/PRODUCTION).

services:
  postgres:
    image: postgres:16-alpine
    container_name: portpax-postgres-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portpax}
      POSTGRES_USER: ${POSTGRES_USER:-portpax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - portpax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portpax_pgdata:
